name: Deploy ESMOS Odoo

on:
  repository_dispatch:
    types: [alert-staging, alert-prod]
  push:
    branches:
      - Staging
      - master

jobs:
  deploy-staging:
    if: (github.ref == 'refs/heads/Staging' && github.event_name == 'push') || github.event.action == 'alert-staging'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check commit message
        if: github.event.action != 'alert-staging'
        id: check_commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qi "revert"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: github.event.action != 'alert-staging' && steps.check_commit.outputs.skip != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            darrentiang0/esmos-odoo:latest
            darrentiang0/esmos-odoo:${{ github.sha }}

      - name: Backup current config on Staging
        if: github.event.action != 'alert-staging' && steps.check_commit.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: azureuser
          key: ${{ secrets.STAGING_KEY }}
          script: |
            cd ~/esmos-odoo
            if [ -f docker-compose.yml ]; then
              cp docker-compose.yml .previous_docker_compose
              echo "Backed up current docker-compose.yml"
            fi

      - name: Copy docker-compose to Staging
        if: github.event.action != 'alert-staging' && steps.check_commit.outputs.skip != 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: azureuser
          key: ${{ secrets.STAGING_KEY }}
          source: "docker-compose.yml"
          target: "/home/azureuser/esmos-odoo/"

      - name: Deploy to Staging
        if: github.event.action != 'alert-staging' && steps.check_commit.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: azureuser
          key: ${{ secrets.STAGING_KEY }}
          script: |
            cd ~/esmos-odoo
            if [ -f .current_version ]; then
              cp .current_version .previous_version
            fi
            date +%s > .last_deploy_time
            echo "${{ github.sha }}" > .current_version
            sed -i "s|DB_PASSWORD|${{ secrets.DB_PASSWORD }}|g" docker-compose.yml
            docker-compose down
            docker pull darrentiang0/esmos-odoo:${{ github.sha }}
            sed -i "s|image: darrentiang0/esmos-odoo:.*|image: darrentiang0/esmos-odoo:${{ github.sha }}|g" docker-compose.yml
            docker-compose up -d

      - name: Smoke Test Gate - Staging
        if: github.event.action != 'alert-staging' && steps.check_commit.outputs.skip != 'true'
        run: |
          echo "Waiting 1m for Odoo to start..."
          sleep 60
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://odoo-staging.centralindia.cloudapp.azure.com)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test FAILED — triggering rollback via Logic App"
            curl -X POST "${{ secrets.LOGIC_APP_STAGING_URL }}" \
              -H "Content-Type: application/json" \
              -d '{"action": "alert-staging"}'
            exit 1
          fi
          echo "Smoke test PASSED — Odoo is healthy"

      - name: Rollback on Alert
        if: github.event.action == 'alert-staging'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: azureuser
          key: ${{ secrets.STAGING_KEY }}
          script: |
            cd ~/esmos-odoo
            if [ ! -f .previous_version ]; then
              echo "No previous version found, aborting rollback"
              exit 1
            fi
            if [ -f .last_deploy_time ]; then
              LAST_DEPLOY=$(cat .last_deploy_time)
              NOW=$(date +%s)
              DIFF=$((NOW - LAST_DEPLOY))
              if [ $DIFF -gt 600 ]; then
                echo "Alert is not within 10 minutes of last deployment. Restarting Container"
                docker-compose down
                docker-compose up -d
                exit 0
              fi
            fi
            PREV_SHA=$(cat .previous_version)
            echo "Rolling back to $PREV_SHA"
            echo "$PREV_SHA" > .current_version
            if [ -f .previous_docker_compose ]; then
              cp .previous_docker_compose docker-compose.yml
              echo "Restored previous docker-compose.yml"
            fi
            sed -i "s|DB_PASSWORD|${{ secrets.DB_PASSWORD }}|g" docker-compose.yml
            docker-compose down
            docker pull darrentiang0/esmos-odoo:$PREV_SHA
            sed -i "s|image: darrentiang0/esmos-odoo:.*|image: darrentiang0/esmos-odoo:$PREV_SHA|g" docker-compose.yml
            docker-compose up -d

  deploy-production:
    if: (github.ref == 'refs/heads/master' && github.event_name == 'push') || github.event.action == 'alert-prod'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check commit message
        if: github.event.action != 'alert-prod'
        id: check_commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qi "revert"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: github.event.action != 'alert-prod' && steps.check_commit.outputs.skip != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            darrentiang0/esmos-odoo:latest
            darrentiang0/esmos-odoo:${{ github.sha }}

      - name: Backup current config on Production
        if: github.event.action != 'alert-prod' && steps.check_commit.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: azureuser
          key: ${{ secrets.PRODUCTION_KEY }}
          script: |
            cd ~/esmos-odoo
            if [ -f docker-compose.yml ]; then
              cp docker-compose.yml .previous_docker_compose
              echo "Backed up current docker-compose.yml"
            fi

      - name: Copy configs to Production
        if: github.event.action != 'alert-prod' && steps.check_commit.outputs.skip != 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: azureuser
          key: ${{ secrets.PRODUCTION_KEY }}
          source: "docker-compose.yml,nginx/nginx.conf"
          target: "/home/azureuser/esmos-odoo/"

      - name: Deploy to Production
        if: github.event.action != 'alert-prod' && steps.check_commit.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: azureuser
          key: ${{ secrets.PRODUCTION_KEY }}
          script: |
            cd ~/esmos-odoo
            if [ -f .current_version ]; then
              cp .current_version .previous_version
            fi
            date +%s > .last_deploy_time
            echo "${{ github.sha }}" > .current_version
            sed -i "s|DB_PASSWORD|${{ secrets.DB_PASSWORD }}|g" docker-compose.yml
            docker-compose down
            docker pull darrentiang0/esmos-odoo:${{ github.sha }}
            sed -i "s|image: darrentiang0/esmos-odoo:.*|image: darrentiang0/esmos-odoo:${{ github.sha }}|g" docker-compose.yml
            docker-compose up -d

      - name: Smoke Test Gate - Production
        if: github.event.action != 'alert-prod' && steps.check_commit.outputs.skip != 'true'
        run: |
          echo "Waiting 1m for Odoo to start..."
          sleep 60
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://odoo-production.centralindia.cloudapp.azure.com)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test FAILED — triggering rollback via Logic App"
            curl -X POST "${{ secrets.LOGIC_APP_PROD_URL }}" \
              -H "Content-Type: application/json" \
              -d '{"action": "alert-prod"}'
            exit 1
          fi
          echo "Smoke test PASSED — Odoo is healthy"

      - name: Rollback on Alert
        if: github.event.action == 'alert-prod'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: azureuser
          key: ${{ secrets.PRODUCTION_KEY }}
          script: |
            cd ~/esmos-odoo
            if [ ! -f .previous_version ]; then
              echo "No previous version found, aborting rollback"
              exit 1
            fi
            if [ -f .last_deploy_time ]; then
              LAST_DEPLOY=$(cat .last_deploy_time)
              NOW=$(date +%s)
              DIFF=$((NOW - LAST_DEPLOY))
              if [ $DIFF -gt 600 ]; then
                echo "Alert is not within 10 minutes of last deployment. Restarting Container"
                docker-compose down
                docker-compose up -d
                exit 0
              fi
            fi
            PREV_SHA=$(cat .previous_version)
            echo "Rolling back to $PREV_SHA"
            echo "$PREV_SHA" > .current_version
            if [ -f .previous_docker_compose ]; then
              cp .previous_docker_compose docker-compose.yml
              echo "Restored previous docker-compose.yml"
            fi
            sed -i "s|DB_PASSWORD|${{ secrets.DB_PASSWORD }}|g" docker-compose.yml
            docker-compose down
            docker pull darrentiang0/esmos-odoo:$PREV_SHA
            sed -i "s|image: darrentiang0/esmos-odoo:.*|image: darrentiang0/esmos-odoo:$PREV_SHA|g" docker-compose.yml
            docker-compose up -d