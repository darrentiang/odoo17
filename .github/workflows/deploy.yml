name: Deploy ESMOS Odoo

on:
  repository_dispatch:
    types: [alert-staging]
  push:
    branches:
      - Staging
      - master

jobs:
  deploy-staging:
    if: (github.ref == 'refs/heads/Staging' && github.event_name == 'push') || github.event.action == 'alert-staging'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check commit message
        if: github.event.action != 'alert-staging'
        id: check_commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qi "revert"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: github.event.action != 'alert-staging' && steps.check_commit.outputs.skip != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            darrentiang0/esmos-odoo:latest
            darrentiang0/esmos-odoo:${{ github.sha }}

      - name: Deploy to Staging
        if: github.event.action != 'alert-staging' && steps.check_commit.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: azureuser
          key: ${{ secrets.STAGING_KEY }}
          script: |
            cd ~/esmos-odoo

            git pull origin Staging

            if [ -f .current_version ]; then
              cp .current_version .previous_version
            fi

            echo "${{ github.sha }}" > .current_version

            docker-compose down
            docker pull darrentiang0/esmos-odoo:${{ github.sha }}

            sed -i "s|image: darrentiang0/esmos-odoo:.*|image: darrentiang0/esmos-odoo:${{ github.sha }}|g" docker-compose.yml

            docker-compose up -d

      - name: Rollback on Alert
        if: github.event.action == 'alert-staging'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: azureuser
          key: ${{ secrets.STAGING_KEY }}
          script: |
            cd ~/esmos-odoo

            if [ ! -f .previous_version ]; then
              echo "No previous version found, aborting rollback"
              exit 1
            fi

            PREV_SHA=$(cat .previous_version)
            echo "Rolling back to $PREV_SHA"
            echo "$PREV_SHA" > .current_version

            docker-compose down
            docker pull darrentiang0/esmos-odoo:$PREV_SHA
            sed -i "s|image: darrentiang0/esmos-odoo:.*|image: darrentiang0/esmos-odoo:$PREV_SHA|g" docker-compose.yml
            docker-compose up -d

  deploy-production:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: darrentiang0/esmos-odoo:latest

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: azureuser
          key: ${{ secrets.PRODUCTION_KEY }}
          script: |
            cd ~/esmos-odoo
            docker-compose down
            docker pull darrentiang0/esmos-odoo:latest
            docker-compose up -d